# Loading minimal mistakes theme
remote_theme: "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin: "default"

# Global configuration
title: "jPipe"
subtitle: "Justification made easier!"
title_separator: "::"

name: "Sébastien Mosser"
email: "contact@jpipe.org"

description: >- 
  jPipe is a tool designed by McSCert to support developers when writing justifications.

#baseurl: "/jpipe" 
#url: "http://ace-design.github.io" 

baseurl: "" 
url: "https://www.jpipe.org" 

locale: "en"
repository: "ace-design/jpipe"

logo: "/assets/images/logo.png"

twitter:
  username: petitroll

github_username:  mosser

# Build settings
markdown: kramdown

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

include: 
  - _pages
  - _docs

exclude:
  - README

date_format: "%Y-%m-%d"

defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      show_date: true
      read_time: true
  # _tutorials
  - scope:
      path: ""
      type: tutorials
    values:
      layout: single
      author_profile: false
      sidebar: 
        nav: tutorials

enable_copy_code_button: true

lunr:
  search_within_pages: true


collections:
  tutorials:
    output: true
    permalink: /:collection/:path/
  docs:
    output: true
    permalink: /:collection/:path/
